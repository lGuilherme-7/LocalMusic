<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Local Music</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #111118;
      --header-bg: #1a1a27;
      --bubble-in: #1e1e2e;
      --bubble-out:#2a2060;
      --accent:    #7c52f5;
      --accent2:   #a78bfa;
      --text:      #f0eeff;
      --sub:       #a8a8c8;
      --muted:     #5a5a7a;
      --radius:    18px;
    }

    html, body {
      height: 100%;
      overflow: hidden;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      display: flex;
      flex-direction: column;
    }

    /* ── header estilo WhatsApp ── */
    .wa-header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 20px;
      background: var(--header-bg);
      border-bottom: 1px solid rgba(255,255,255,0.06);
      flex-shrink: 0;
    }
    .wa-avatar {
      width: 40px; height: 40px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      display: flex; align-items: center; justify-content: center;
      font-size: 20px;
      flex-shrink: 0;
    }
    .wa-info { flex: 1; min-width: 0; }
    .wa-name { font-size: 15px; font-weight: 600; color: var(--text); }
    .wa-status { font-size: 12px; color: var(--sub); margin-top: 1px; }

    /* ── área de mensagens ── */
    .messages {
      flex: 1;
      overflow-y: auto;
      overflow-x: hidden;
      padding: 20px 16px 12px;
      display: flex;
      flex-direction: column;
      gap: 6px;
      scroll-behavior: smooth;
    }
    /* esconde scrollbar mas mantém funcional */
    .messages::-webkit-scrollbar { width: 0; }

    /* ── bolha ── */
    .bubble {
      max-width: 78%;
      padding: 9px 13px 7px;
      font-size: 15px;
      line-height: 1.5;
      border-radius: var(--radius);
      word-break: break-word;
      animation: popIn 0.2s ease;
    }
    .bubble.in {
      background: var(--bubble-in);
      border-bottom-left-radius: 4px;
      align-self: flex-start;
      color: var(--text);
    }
    .bubble.out {
      background: var(--bubble-out);
      border-bottom-right-radius: 4px;
      align-self: flex-end;
      color: #e8e0ff;
    }
    .bubble .time {
      font-size: 11px;
      color: var(--muted);
      display: block;
      text-align: right;
      margin-top: 3px;
    }

    /* ── cursor piscante dentro da bolha ── */
    .cursor {
      display: inline-block;
      width: 2px; height: 14px;
      background: var(--accent2);
      border-radius: 1px;
      margin-left: 1px;
      vertical-align: middle;
      animation: blink 0.55s step-end infinite;
    }

    /* ── indicador de digitando ── */
    .typing-bubble {
      background: var(--bubble-in);
      border-radius: var(--radius);
      border-bottom-left-radius: 4px;
      align-self: flex-start;
      padding: 12px 16px;
      display: flex;
      align-items: center;
      gap: 5px;
      animation: popIn 0.2s ease;
    }
    .dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--sub);
    }
    .dot:nth-child(1) { animation: bounce 1.1s 0.0s ease-in-out infinite; }
    .dot:nth-child(2) { animation: bounce 1.1s 0.18s ease-in-out infinite; }
    .dot:nth-child(3) { animation: bounce 1.1s 0.36s ease-in-out infinite; }

    /* ── rodapé ── */
    .footer {
      flex-shrink: 0;
      padding: 18px 20px 36px;
      background: var(--header-bg);
      border-top: 1px solid rgba(255,255,255,0.06);
      display: flex;
      flex-direction: column;
      gap: 12px;
      opacity: 0;
      transform: translateY(16px);
      transition: opacity 0.4s ease, transform 0.4s ease;
      pointer-events: none;
    }
    .footer.visible {
      opacity: 1;
      transform: translateY(0);
      pointer-events: all;
    }

    .btn-start {
      display: flex; align-items: center; justify-content: center; gap: 8px;
      width: 100%;
      padding: 15px;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 14px;
      font-family: 'DM Sans', sans-serif;
      font-size: 16px; font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.15s;
    }
    .btn-start:active { transform: scale(0.97); opacity: 0.88; }

    .check-row {
      display: flex; align-items: center; justify-content: center; gap: 10px;
      cursor: pointer;
      user-select: none;
    }
    .check-box {
      width: 20px; height: 20px;
      border-radius: 6px;
      border: 2px solid var(--muted);
      display: flex; align-items: center; justify-content: center;
      transition: background 0.2s, border-color 0.2s;
      flex-shrink: 0;
    }
    .check-box svg { display: none; }
    #no-show:checked + .check-row .check-box {
      background: var(--accent);
      border-color: var(--accent);
    }
    #no-show:checked + .check-row .check-box svg { display: block; }
    #no-show { display: none; }
    .check-label { font-size: 14px; color: var(--sub); }

    /* ── keyframes ── */
    @keyframes popIn {
      from { opacity: 0; transform: scale(0.92) translateY(6px); }
      to   { opacity: 1; transform: scale(1)    translateY(0);   }
    }
    @keyframes bounce {
      0%, 60%, 100% { transform: translateY(0); }
      30%           { transform: translateY(-5px); }
    }
    @keyframes blink {
      0%, 100% { opacity: 1; }
      50%      { opacity: 0; }
    }
  </style>
</head>
<body>

<!-- Header estilo WhatsApp -->
<div class="wa-header">
  <div class="wa-avatar">♪</div>
  <div class="wa-info">
    <p class="wa-name">Local Music</p>
    <p class="wa-status" id="wa-status">online</p>
  </div>
</div>

<!-- Mensagens -->
<div class="messages" id="messages"></div>

<!-- Rodapé com botão e checkbox -->
<div class="footer" id="footer">
  <button class="btn-start" id="btn-start">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><polygon points="5,3 19,12 5,21"/></svg>
    Começar
  </button>
  <input type="checkbox" id="no-show" />
  <label class="check-row" for="no-show">
    <div class="check-box">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
    </div>
    <span class="check-label">Não mostrar novamente</span>
  </label>
</div>

<script>
  const STORAGE_KEY = 'lm_welcomed';

  if (localStorage.getItem(STORAGE_KEY)) {
    window.location.replace('index.html');
  }

  // ── Script de hora estilo WhatsApp ──
  function _time() {
    const d = new Date();
    return `${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
  }

  // ── Roteiro de conversa ──
  // side: 'in' = app fala | 'out' = usuário responde
  const SCRIPT = [
    { side: 'in',  text: 'Oi! Eu sou o Local Music 🎵' },
    { side: 'out', text: 'Oi! O que você faz?' },
    { side: 'in',  text: 'Sou um player de músicas que roda direto no seu navegador, sem precisar instalar nada.' },
    { side: 'in',  text: 'Suas músicas ficam na sua pasta, no seu dispositivo. Nenhum dado vai pra nuvem.' },
    { side: 'out', text: 'Sem conta? Sem assinatura?' },
    { side: 'in',  text: 'Zero. Sem conta, sem anúncio, sem algoritmo te dizendo o que ouvir. 🙅' },
    { side: 'out', text: 'Legal! Como começo?' },
    { side: 'in',  text: 'Na tela inicial, toque em "Abrir pasta de músicas" e escolha a pasta onde seus arquivos estão.' },
    { side: 'in',  text: 'Aceito MP3, M4A, FLAC, WAV, OGG e AAC  praticamente tudo. 🎶' },
    { side: 'out', text: 'E posso organizar as músicas?' },
    { side: 'in',  text: 'Sim! Crie quantas playlists quiser, favorite as que você mais ama e agrupe por artista.' },
    { side: 'in',  text: 'Basta tocar em ⋮ em qualquer música para adicioná-la a uma playlist ou criar um grupo de artista.' },
    { side: 'out', text: 'E se eu quiser baixar músicas novas?' },
    { side: 'in',  text: 'Na aba "Baixar" tem um atalho pro Y2mate. Baixe o áudio de lá, mova pra sua pasta e pronto aparece automaticamente aqui. ⬇️' },
    { side: 'out', text: 'Parece simples!' },
    { side: 'in',  text: 'Essa é a ideia. Sua música, do seu jeito, sem complicação. Pode começar! 🚀' },
  ];

  const messagesEl = document.getElementById('messages');
  const footer     = document.getElementById('footer');
  const statusEl   = document.getElementById('wa-status');

  let scriptIdx = 0;

  // Velocidade de digitação por caractere (ms)
  const CHAR_SPEED = 40;
  // Pausa antes de mostrar a próxima mensagem após terminar de digitar
  const PAUSE_AFTER = 700;
  // Tempo que o indicador de "digitando" fica visível antes de começar a digitar
  const TYPING_DELAY_IN  = 900;
  const TYPING_DELAY_OUT = 300;

  function scrollBottom() {
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  function showTypingIndicator(side, cb) {
    if (side === 'out') { cb(); return; } // usuário não mostra typing

    statusEl.textContent = 'digitando...';

    const el = document.createElement('div');
    el.className = 'typing-bubble';
    el.innerHTML = '<div class="dot"></div><div class="dot"></div><div class="dot"></div>';
    messagesEl.appendChild(el);
    scrollBottom();

    setTimeout(() => {
      el.remove();
      statusEl.textContent = 'online';
      cb();
    }, TYPING_DELAY_IN);
  }

  function typeMessage(side, text, cb) {
    const bubble = document.createElement('div');
    bubble.className = `bubble ${side}`;

    const textNode = document.createTextNode('');
    const cursor   = document.createElement('span');
    cursor.className = 'cursor';

    bubble.appendChild(textNode);
    bubble.appendChild(cursor);
    messagesEl.appendChild(bubble);
    scrollBottom();

    let i = 0;
    const speed = side === 'out' ? CHAR_SPEED * 0.7 : CHAR_SPEED;

    function tick() {
      if (i < text.length) {
        textNode.textContent += text[i++];
        scrollBottom();
        setTimeout(tick, speed + Math.random() * 10);
      } else {
        cursor.remove();
        const time = document.createElement('span');
        time.className   = 'time';
        time.textContent = _time();
        bubble.appendChild(time);
        setTimeout(cb, PAUSE_AFTER);
      }
    }
    tick();
  }

  function nextMessage() {
    if (scriptIdx >= SCRIPT.length) {
      footer.classList.add('visible');
      return;
    }

    const { side, text } = SCRIPT[scriptIdx++];
    const delay = side === 'out' ? TYPING_DELAY_OUT : 0;

    setTimeout(() => {
      showTypingIndicator(side, () => {
        typeMessage(side, text, nextMessage);
      });
    }, delay);
  }

  // Inicia com pequeno delay inicial
  setTimeout(nextMessage, 600);

  // ── Ações ──
  document.getElementById('btn-start').addEventListener('click', () => {
    if (document.getElementById('no-show').checked) {
      localStorage.setItem(STORAGE_KEY, '1');
    }
    window.location.href = 'index.html';
  });
</script>

</body>
</html>
