<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2E7D32"/>
      <stop offset="100%" stop-color="#1B5E20"/>
    </linearGradient>
  </defs>
  <rect width="200" height="200" rx="36" fill="url(#bg)"/>
  <!-- Yellow circle accent (Brazilian flag vibe) -->
  <circle cx="130" cy="68" r="48" fill="#FFEB3B" opacity="0.10"/>
  <!-- Double eighth note: note 1 -->
  <ellipse cx="70" cy="140" rx="18" ry="12" fill="#fff" opacity="0.95" transform="rotate(-18,70,140)"/>
  <rect x="86" y="76" width="6" height="64" rx="3" fill="#fff" opacity="0.95"/>
  <!-- note 2 -->
  <ellipse cx="118" cy="130" rx="18" ry="12" fill="#fff" opacity="0.95" transform="rotate(-18,118,130)"/>
  <rect x="134" y="66" width="6" height="64" rx="3" fill="#fff" opacity="0.95"/>
  <!-- Beam (thick bar connecting stems) -->
  <line x1="86" y1="80" x2="140" y2="68" stroke="#fff" stroke-width="6" stroke-linecap="round"/>
  <line x1="86" y1="92" x2="140" y2="80" stroke="#fff" stroke-width="4" stroke-linecap="round" opacity="0.6"/>
  <!-- Genre label -->
  <rect x="0" y="158" width="200" height="42" rx="0" fill="rgba(0,0,0,0.35)"/>
  <text x="100" y="184" text-anchor="middle" font-family="'DM Sans',Arial,sans-serif" font-size="22" font-weight="700" fill="#fff" letter-spacing="1">MPB</text>
</svg>
