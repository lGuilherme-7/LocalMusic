  <!-- Genre label -->
  <rect x="0" y="158" width="200" height="42" rx="0" fill="rgba(0,0,0,0.45)"/>
  <text x="100" y="184" text-anchor="middle" font-family="'DM Sans',Arial,sans-serif" font-size="22" font-weight="700" fill="#fff" letter-spacing="1">ROCK</text>
</svg>
